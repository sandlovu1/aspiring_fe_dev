<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aspiring FE</title>
    </head>
    <body>
        <div class="container">
            <form action class="form">
                <div class="formBox">
                    <label for>Full Name ICON</label>
                    <input type="text" id="nameInput" placeholder="John Doe">
                </div>

                <div class="formBox">
                    <label for>Phone</label>
                    <input type="tel" id="phone" placeholder="+27 71 030 1105">
                </div>

                <div class="formBox">
                    <select name="services" id="services">
                        <option value="Choose Your Service"> Choose Your
                            Service:</option>
                        <option value="web developer">Web Development</option>
                        <option value="web apps">Web Applications</option>
                        <option value="photograph">Photograph</option>
                        <option value="it-technician">IT Technician</option>
                    </select>
                </div>

                <div class="formBox">
                    <textarea name="messege" id="messege"
                        placeholder="Your messege here!...."></textarea>
                </div>

                <div class="display"></div>

                <button type="submit">Submit</button>
            </form>
        </div>

    </body>
</html>
